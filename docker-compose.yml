version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: yahooquiz
      POSTGRES_USER: yahooquiz
      POSTGRES_PASSWORD: yahooquiz_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yahooquiz"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://yahooquiz:yahooquiz_password@db:5432/yahooquiz
      - GROQ_API_KEY=${GROQ_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - PORT=8080
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        python migrations/init_db.py &&
        exec gunicorn --bind :8080 --workers 1 --threads 8 --timeout 0 app:app
      "

volumes:
  postgres_data:
